<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPlanner - Timer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode">
    <header>
    <div class="header-content">
        <button id="sidebarToggle" class="sidebar-toggle">
            <i class="fas fa-bars"></i>
        </button>
        <h1 class="label">StudyPlanner</h1>
        <!-- User info will be dynamically added here -->
    </div>
</header>

    <aside id="sidebar">
        <div class="sidebar-header">
            <button id="sidebarCollapse" class="sidebar-collapse">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav>
            <ul>
                <li><a href="main.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="history.html"><i class="fas fa-history"></i> History</a></li>
                <li><a href="timer.html"><i class="fas fa-clock"></i> Timer</a></li>
                <li><a href="resources.html"><i class="fas fa-search"></i> Resource Finder</a></li>
                <li>
                    <div class="theme-switch-wrapper">
                        <i class="fas fa-sun"></i>
                        <label class="theme-switch">
                            <input type="checkbox" id="themeToggle" />
                            <div class="slider round"></div>
                        </label>
                        <i class="fas fa-moon"></i>
                    </div>
                </li>
            </ul>
        </nav>
    </aside>

    <main id="mainContent">
        <div class="container">
            <div class="timer-container">
                <div class="timer-box">
                    <h2><i class="fas fa-tomato"></i> Pomodoro Timer</h2>
                    <div class="timer-controls">
                        <button id="pomodoroBtn" class="timer-preset">🍅 25:00</button>
                        <button id="shortBreakBtn" class="timer-preset">☕ 5:00</button>
                        <button id="longBreakBtn" class="timer-preset">🌿 15:00</button>
                    </div>
                    <div class="clock">
                        <span id="pomodoroTimer">25:00</span>
                    </div>
                    <div class="timer-actions">
                        <button id="startPomodoroBtn" class="action-btn"><i class="fas fa-play"></i> Start</button>
                        <button id="pausePomodoroBtn" class="action-btn" disabled><i class="fas fa-pause"></i> Pause</button>
                        <button id="resetPomodoroBtn" class="action-btn"><i class="fas fa-redo"></i> Reset</button>
                    </div>
                </div>

                <div class="timer-box">
                    <h2><i class="fas fa-stopwatch"></i> Custom Timer</h2>
                    <div class="clock">
                        <span id="normalTimer">00:00:00</span>
                    </div>
                    <div class="timer-actions">
                        <input type="number" id="setMinutes" placeholder="Minutes" min="0">
                        <button id="startNormalBtn" class="action-btn"><i class="fas fa-play"></i> Start</button>
                        <button id="pauseNormalBtn" class="action-btn" disabled><i class="fas fa-pause"></i> Pause</button>
                        <button id="resetNormalBtn" class="action-btn"><i class="fas fa-redo"></i> Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="timer.js"></script>
    <script src="script.js"></script>
</body>
</html>
