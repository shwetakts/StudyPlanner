<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPlanner - History</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode">
    <header>
        <div class="header-content">
            <button id="sidebarToggle" class="sidebar-toggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="label">StudyPlanner</h1>
            <!-- User info will be dynamically added here by script.js -->
        </div>
    </header>

    <aside id="sidebar">
        <div class="sidebar-header">
            <button id="sidebarCollapse" class="sidebar-collapse">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav>
            <ul>
                <li><a href="main.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="history.html"><i class="fas fa-history"></i> History</a></li>
                <li><a href="timer.html"><i class="fas fa-clock"></i> Timer</a></li>
                <li><a href="resources.html"><i class="fas fa-search"></i> Resource Finder</a></li>
                <li>
                    <div class="theme-switch-wrapper">
                        <i class="fas fa-sun"></i>
                        <label class="theme-switch">
                            <input type="checkbox" id="themeToggle" />
                            <div class="slider round"></div>
                        </label>
                        <i class="fas fa-moon"></i>
                    </div>
                </li>
            </ul>
        </nav>
    </aside>

    <main id="mainContent">
        <div class="container">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search your study plans...">
                <button id="searchButton"><i class="fas fa-search"></i></button>
            </div>

            <section id="historySection">
                <h3 style="color: white; margin-bottom: 1.5rem;">Your Study Plan History</h3>
                <div id="historyContent" class="history-content"></div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
